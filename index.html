<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Carlos Chaveiro - Login Nuvem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        
        body { 
            background-color: #0A192F; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white; 
            transition: background 0.2s ease;
        }
        
        .login-card { 
            background: #172A45; 
            padding: 40px; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            border-top: 5px solid #ffcc00; 
            text-align: center; 
        }
        
        .login-card h2 { color: #ffcc00; margin-bottom: 25px; font-size: 24px; }
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 38px; color: #8892b0; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #cbd5e1; }
        input { width: 100%; padding: 12px 12px 12px 42px; border: 1px solid #233554; border-radius: 4px; background: #0A192F; color: white; font-size: 16px; }
        input:focus { border-color: #ffcc00; outline: none; }
        
        .btn-login { 
            background: #ffcc00; 
            color: #0A192F; 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: background 0.2s; 
            margin-top: 10px; 
        }
        .btn-login:hover { background: #e6b800; }
        
        .toggle-link { display: inline-block; margin-top: 20px; color: #ffcc00; text-decoration: none; font-size: 14px; cursor: pointer; }
        .toggle-link:hover { text-decoration: underline; }

        .escondido { display: none !important; }
        
        .icone-grande { font-size: 70px; margin-bottom: 15px; display: block; }
        .icone-presente { color: #28a745; animation: balancar 0.6s infinite alternate ease-in-out; }
        .icone-alerta { color: #ffcc00; }
        
        @keyframes balancar {
            from { transform: rotate(-6deg); }
            to { transform: rotate(6deg); }
        }

        .piscar-vermelho {
            animation: alerta-pisca 0.4s infinite !important;
        }
        @keyframes alerta-pisca {
            0%, 100% { background-color: #0A192F; }
            50% { background-color: #b91c1c; }
        }
    </style>
</head>
<body>

    <!-- 1. TELA DE LOGIN PRINCIPAL -->
    <div class="login-card" id="card-login">
        <h2><i class="fa-solid fa-key"></i> Carlos Chaveiro</h2>
        <form id="form-login" onsubmit="realizarLogin(event)">
            <div class="input-group">
                <label>Usuário:</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" id="user-input" required placeholder="Digite seu usuário">
            </div>
            <div class="input-group">
                <label>Senha:</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="pass-input" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn-login">ACESSAR SISTEMA</button>
        </form>
        <span class="toggle-link" onclick="alternarTelas('cadastro')">Não tem uma conta? Criar novo usuário</span>
    </div>

    <!-- 2. TELA DE CADASTRO -->
    <div class="login-card escondido" id="card-cadastro" style="border-top-color: #28a745;">
        <h2><i class="fa-solid fa-user-plus"></i> Novo Usuário</h2>
        <form id="form-cadastro" onsubmit="cadastrarUsuario(event)">
            <div class="input-group">
                <label>Nome do Funcionário/Operador:</label>
                <i class="fa-solid fa-id-card"></i>
                <input type="text" id="cad-nome" required placeholder="Ex: João Chaveiro">
            </div>
            <div class="input-group">
                <label>Usuário (Login):</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" id="cad-user" required placeholder="Ex: joao123">
            </div>
            <div class="input-group">
                <label>Senha de Acesso:</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="cad-pass" required placeholder="Mínimo 4 dígitos">
            </div>
            <button type="submit" class="btn-login" style="background: #28a745; color: white;">SALVAR REGISTRO</button>
        </form>
        <span class="toggle-link" onclick="alternarTelas('login')" style="color: #cbd5e1;">Voltar para o Login</span>
    </div>

    <!-- 3. TELA DE LOGIN POSITIVO (Sucesso) -->
    <div class="login-card escondido" id="card-sucesso" style="border-top-color: #28a745;">
        <i class="fa-solid fa-gift icone-grande icone-presente"></i>
        <h2>Parabéns!</h2>
        <p style="margin-bottom: 20px; color: #cbd5e1;">Login efetuado com sucesso na Nuvem.</p>
        <button class="btn-login" style="background: #28a745; color: white;" onclick="voltarParaLogin()">SAIR / VOLTAR</button>
    </div>

    <!-- 4. TELA DE LOGIN NEGATIVO (Erro) -->
    <div class="login-card escondido" id="card-erro" style="border-top-color: #ff3333; background: #2a1414;">
        <i class="fa-solid fa-triangle-exclamation icone-grande icone-alerta"></i>
        <h2>Atenção!</h2>
        <p style="margin-bottom: 20px; color: #cbd5e1;">Usuário ou senha incorretos!</p>
        <button class="btn-login" style="background: #ff3333; color: white;" onclick="voltarParaLogin()">TENTAR NOVAMENTE</button>
    </div>

    <!-- Conexão e Lógica com o Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Suas chaves de acesso configuradas
        const SUPABASE_URL = "https://rbikozjbhgajbgxxcmdn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiaWtvempiaGdhamJneHhjbWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDYzNzYsImV4cCI6MjA5NTA4MjM3Nn0.yHuvmvocefkK9-YvMNeKI6w34A9_d2WHm0fTs531E_I";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function alternarTelas(tela) {
            document.getElementById('card-login').classList.add('escondido');
            document.getElementById('card-cadastro').classList.add('escondido');
            document.getElementById('card-sucesso').classList.add('escondido');
            document.getElementById('card-erro').classList.add('escondido');

            if(tela === 'cadastro') {
                document.getElementById('card-cadastro').classList.remove('escondido');
            } else if(tela === 'login') {
                document.getElementById('card-login').classList.remove('escondido');
            } else if(tela === 'sucesso') {
                document.getElementById('card-sucesso').classList.remove('escondido');
            } else if(tela === 'erro') {
                document.getElementById('card-erro').classList.remove('escondido');
            }
        }

        // CADASTRO CONECTADO À NUVEM
        async function cadastrarUsuario(e) {
            e.preventDefault();
            const nome = document.getElementById('cad-nome').value;
            const usuario = document.getElementById('cad-user').value.trim().toLowerCase();
            const emailFake = usuario + "@carloschaveiro.com";
            const senhaOriginal = document.getElementById('cad-pass').value;
            
            // Ajuste para bater o requisito de 6 dígitos mínimos do Supabase de forma invisível
            const senhaSegura = senhaOriginal + "_cloud"; 

            const { data, error } = await supabase.auth.signUp({
                email: emailFake,
                password: senhaSegura,
                options: { data: { nome_completo: nome } }
            });

            if (error) {
                alert("Erro ao salvar na nuvem: " + error.message);
            } else {
                document.getElementById('form-cadastro').reset();
                alert('Usuário registrado globalmente com sucesso!');
                alternarTelas('login');
            }
        }

        // LOGIN CONECTADO À NUVEM
        async function realizarLogin(e) {
            e.preventDefault();
            const u = document.getElementById('user-input').value.trim().toLowerCase();
            const s = document.getElementById('pass-input').value;
            const emailFake = u + "@carloschaveiro.com";
            const senhaSegura = s + "_cloud";

            const { data, error } = await supabase.auth.signInWithPassword({
                email: emailFake,
                password: senhaSegura
            });

            if (error) {
                alternarTelas('erro');
                document.body.classList.add('piscar-vermelho');
            } else {
                const nomeOperador = data.user.user_metadata.nome_completo || u;
                localStorage.setItem('operadorAtivo', nomeOperador);
                alternarTelas('sucesso');
            }
        }

        function voltarParaLogin() {
            document.body.classList.remove('piscar-vermelho');
            document.getElementById('form-login').reset();
            alternarTelas('login');
        }
    </script>
</body>
</html>
