<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login Dinâmica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. TELA DE LOGIN -->
    <div id="tela-login" class="card">
        <h2>Área de Acesso</h2>
        <form id="form-login">
            <div class="campo">
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" placeholder="Digite seu usuário" required>
            </div>
            <div class="campo">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <!-- 2. TELA DE SUCESSO (Login Positivo) -->
    <div id="tela-sucesso" class="card escondido">
        <div class="icone-presente">🎁</div>
        <h1>Parabéns!</h1>
        <p>Você logou com sucesso.</p>
        <button onclick="voltar()">Voltar</button>
    </div>

    <!-- 3. TELA DE ERRO (Login Negativo) -->
    <div id="tela-erro" class="card escondido">
        <div class="icone-alerta">⚠️</div>
        <h1>Atenção!</h1>
        <p>Usuário ou senha incorretos.</p>
        <button onclick="voltar()">Tentar Novamente</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
